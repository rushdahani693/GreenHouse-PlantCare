{% extends "base.html" %}

{% block title %}Edit Plant - Greenhouse Plant Care{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h1>Edit Plant</h1>
        <p class="lead">Update information for {{ plant.name }}</p>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Plant Name *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ plant.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="species" class="form-label">Species</label>
                        <input type="text" class="form-control" id="species" name="species" value="{{ plant.species }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="growth_stage" class="form-label">Growth Stage</label>
                        <select class="form-select" id="growth_stage" name="growth_stage">
                            <option value="">Select Growth Stage</option>
                            <option value="Seedling" {% if plant.growth_stage == 'Seedling' %}selected{% endif %}>Seedling</option>
                            <option value="Vegetative" {% if plant.growth_stage == 'Vegetative' %}selected{% endif %}>Vegetative</option>
                            <option value="Flowering" {% if plant.growth_stage == 'Flowering' %}selected{% endif %}>Flowering</option>
                            <option value="Fruiting" {% if plant.growth_stage == 'Fruiting' %}selected{% endif %}>Fruiting</option>
                            <option value="Mature" {% if plant.growth_stage == 'Mature' %}selected{% endif %}>Mature</option>
                            <option value="Dormant" {% if plant.growth_stage == 'Dormant' %}selected{% endif %}>Dormant</option>
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="optimal_temp" class="form-label">Optimal Temperature (°C) *</label>
                                <input type="number" step="0.01" class="form-control" id="optimal_temp" name="optimal_temp" value="{{ plant.optimal_temp }}" required>
                            </div>
                        </div>
                        
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="optimal_humidity" class="form-label">Optimal Humidity (%) *</label>
                                <input type="number" step="0.01" class="form-control" id="optimal_humidity" name="optimal_humidity" value="{{ plant.optimal_humidity }}" required>
                            </div>
                        </div>
                        
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="optimal_ph" class="form-label">Optimal pH *</label>
                                <input type="number" step="0.01" class="form-control" id="optimal_ph" name="optimal_ph" value="{{ plant.optimal_ph }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <button type="submit" class="btn btn-success">Update Plant</button>
                        <a href="{{ url_for('plants') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Plant Information</div>
            <div class="card-body">
                <p><strong>Plant ID:</strong> {{ plant.plant_id }}</p>
                <p>Update the form to modify this plant's information.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
