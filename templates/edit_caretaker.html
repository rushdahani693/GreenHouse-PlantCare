{% extends "base.html" %}

{% block title %}Edit Caretaker - Greenhouse Manager{% endblock %}

{% block content %}
<h1>Edit Caretaker</h1>

<form method="POST" class="mt-4">
    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ caretaker.name }}" required>
    </div>
    
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" value="{{ caretaker.email }}">
    </div>
    
    <div class="mb-3">
        <label for="phone" class="form-label">Phone</label>
        <input type="text" class="form-control" id="phone" name="phone" value="{{ caretaker.phone }}">
    </div>
    
    <div class="mb-3">
        <label for="specialization" class="form-label">Specialization</label>
        <input type="text" class="form-control" id="specialization" name="specialization" value="{{ caretaker.specialization }}">
    </div>
    
    <div class="mb-3">
        <label for="hire_date" class="form-label">Hire Date</label>
        <input type="date" class="form-control" id="hire_date" name="hire_date" value="{{ caretaker.hire_date }}" required>
    </div>
    
    <button type="submit" class="btn btn-success">Update Caretaker</button>
    <a href="{{ url_for('caretakers') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
