{% extends "base.html" %}

{% block title %}Add Fertilizer - Greenhouse Manager{% endblock %}

{% block content %}
<h1>Add New Fertilizer</h1>

<form method="POST" class="mt-4">
    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    
    <div class="mb-3">
        <label for="type" class="form-label">Type</label>
        <select class="form-control" id="type" name="type">
            <option value="All Purpose">All Purpose</option>
            <option value="Organic">Organic</option>
            <option value="Flowering">Flowering</option>
            <option value="Specialty">Specialty</option>
            <option value="Liquid">Liquid</option>
        </select>
    </div>
    
    <div class="mb-3">
        <label for="npk_ratio" class="form-label">NPK Ratio</label>
        <input type="text" class="form-control" id="npk_ratio" name="npk_ratio" placeholder="e.g., 10-10-10">
    </div>
    
    <div class="mb-3">
        <label for="quantity_available" class="form-label">Quantity Available</label>
        <input type="number" step="0.01" class="form-control" id="quantity_available" name="quantity_available" required>
    </div>
    
    <div class="mb-3">
        <label for="unit" class="form-label">Unit</label>
        <select class="form-control" id="unit" name="unit">
            <option value="kg">kg</option>
            <option value="L">L</option>
            <option value="lb">lb</option>
            <option value="gal">gal</option>
        </select>
    </div>
    
    <div class="mb-3">
        <label for="cost_per_unit" class="form-label">Cost per Unit ($)</label>
        <input type="number" step="0.01" class="form-control" id="cost_per_unit" name="cost_per_unit" required>
    </div>
    
    <button type="submit" class="btn btn-success">Add Fertilizer</button>
    <a href="{{ url_for('fertilizers') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
